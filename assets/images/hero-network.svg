      <stop offset="0" stop-color="#1f7bff" stop-opacity=".95"/>
      <stop offset=".55" stop-color="#0d3ea6" stop-opacity=".9"/>
      <stop offset="1" stop-color="#061b52" stop-opacity=".96"/>
